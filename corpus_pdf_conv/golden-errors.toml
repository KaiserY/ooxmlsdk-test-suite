# The conversion JSONL files and PDFs are immutable reference inputs. Golden
# comparison succeeds by default; add only exact, evidence-backed exceptions
# here. Wildcards and pass lists are intentionally unsupported.
schema_version = 1

[[class]]
id = "office-locale-default-font"
layer = "text"
reason = "The candidate resolves these unqualified Word runs to Calibri while the Office golden uses DengXian. Office documents that the default theme-font languages depend on the Office installation language and installed keyboards, so no general zh-CN font mapping is inferred from the golden alone."
evidence = [
  "corpus_pdf_conv/environment.json",
  "references/references/[MS-OI29500]-260519.md:9600",
]

[[class]]
id = "word-nested-table-content"
layer = "text"
reason = "The candidate omits the inner-table text that is present in the Office golden; the root cause is not established."
evidence = [
  "corpus_pdf_conv/LibreOffice/sw/qa/extras/ooxmlimport/data/tdf111550.docx.pdf",
]

[[class]]
id = "word-page-count"
layer = "page-geometry"
reason = "The candidate produces one page while the Office golden contains four; the layout cause is not established."
evidence = [
  "corpus_pdf_conv/LibreOffice/sw/qa/extras/ooxmlimport/data/tdf108714.docx.pdf",
]

[[class]]
id = "word-table-name-text"
layer = "text"
reason = "The candidate emits a space in the rendered table name that is absent from the Office golden; the import/layout cause is not established."
evidence = [
  "corpus_pdf_conv/LibreOffice/sw/qa/extras/ooxmlexport/data/tdf109306.docx.pdf",
]

[[class]]
id = "word-run-spacing-text"
layer = "text"
reason = "The candidate separates characters inside two words while the Office golden renders the words continuously; the run-layout cause is not established."
evidence = [
  "corpus_pdf_conv/LibreOffice/sw/qa/extras/ooxmlimport/data/tdf124670.docx.pdf",
]

[[class]]
id = "word-font-style"
layer = "text"
reason = "The candidate uses Calibri while the Office golden uses Times New Roman for the table text; the style-resolution cause is not established."
evidence = [
  "corpus_pdf_conv/LibreOffice/sw/qa/extras/ooxmlimport/data/tdf141969-font_in_table_with_style.docx.pdf",
]

[[class]]
id = "word-visible-cloud"
layer = "visible-output"
reason = "The non-text raster difference covers 1.137 percent of the page and exceeds the shared one-percent Office fixed-output contract; no rendering fix is inferred from the image alone."
evidence = [
  "corpus_pdf_conv/LibreOffice/sw/qa/extras/ooxmlexport/data/cloud.docx.pdf",
]

[[class]]
id = "word-altchunk-html"
layer = "text"
reason = "The candidate omits the HTML AltChunk text that is present in the Office golden; AltChunk import is not implemented by assumption."
evidence = [
  "corpus_pdf_conv/LibreOffice/sw/qa/writerfilter/dmapper/data/alt-chunk-html.docx.pdf",
]

[[class]]
id = "word-numbering-format-text"
layer = "text"
reason = "The candidate renders the list label as decimal 1 while the Office golden renders lower Roman i; the numbering-format cause is not established."
evidence = ["Office golden PDF addressed by each exact error entry"]

[[class]]
id = "word-footer-field-text"
layer = "text"
reason = "The candidate omits the Page 1 of 1 footer field text that is present in the Office golden; the footer/field cause is not established."
evidence = ["Office golden PDF addressed by each exact error entry"]

[[class]]
id = "word-text-order"
layer = "text"
reason = "The candidate text ordering differs from the Office golden; the style, field, or list layout cause is not established."
evidence = ["Office golden PDF addressed by each exact error entry"]

